# Development environment: hot-reload API + Vite frontend + dev-safe backing services.
#
# Usage:
#   cp .env.dev.example .env.dev   # first time only
#   docker compose -f docker-compose.dev.yml up --build
#
# Frontend hot-reload:  cd web && npm install && npm run dev   (runs on :5173, proxies API)
# mc binary:            make mc-build                          (output: integrations/mc/target/release/mc)

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: missioncontrol-mosquitto-dev
    restart: unless-stopped
    volumes:
      - ./docker/mosquitto/mosquitto.dev.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -C 1 -t '$$SYS/broker/version' -i healthcheck >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  rustfs:
    image: rustfs/rustfs:latest
    container_name: missioncontrol-rustfs-dev
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: missioncontrol
      RUSTFS_SECRET_KEY: missioncontrol-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - missioncontrol-dev-rustfs:/data
    healthcheck:
      test: ["CMD-SHELL", "code=$$(curl -s -o /dev/null -w '%{http_code}' http://localhost:9000/health/live || true); [ \"$$code\" = \"200\" ] || [ \"$$code\" = \"403\" ]"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  rustfs-init:
    image: python:3.11-slim
    container_name: missioncontrol-rustfs-init-dev
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      MC_OBJECT_STORAGE_ENDPOINT: http://rustfs:9000
      MC_OBJECT_STORAGE_REGION: us-east-1
      MC_OBJECT_STORAGE_ACCESS_KEY: missioncontrol
      MC_OBJECT_STORAGE_ACCESS_SECRET: missioncontrol-secret
      MC_OBJECT_STORAGE_BUCKET: missioncontrol
    entrypoint:
      - /bin/sh
      - -lc
      - |
        pip install --no-cache-dir boto3 -q
        python - <<'PY'
        import os, boto3
        from botocore.exceptions import ClientError
        c = boto3.client("s3",
            endpoint_url=os.environ["MC_OBJECT_STORAGE_ENDPOINT"],
            aws_access_key_id=os.environ["MC_OBJECT_STORAGE_ACCESS_KEY"],
            aws_secret_access_key=os.environ["MC_OBJECT_STORAGE_ACCESS_SECRET"],
            region_name=os.environ["MC_OBJECT_STORAGE_REGION"])
        bucket = os.environ["MC_OBJECT_STORAGE_BUCKET"]
        try:
            c.head_bucket(Bucket=bucket)
            print(f"bucket exists: {bucket}")
        except ClientError as e:
            if e.response["Error"]["Code"] in ("404", "NoSuchBucket", "NotFound"):
                c.create_bucket(Bucket=bucket)
                print(f"bucket created: {bucket}")
            else:
                raise
        PY
    restart: "no"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    container_name: missioncontrol-api-dev
    depends_on:
      mosquitto:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      DATABASE_URL: sqlite:////data/taskman.db
      MC_DB_RUNTIME_MIGRATIONS: "true"
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_USERNAME: ""
      MQTT_PASSWORD: ""
      MC_OBJECT_STORAGE_ENDPOINT: http://rustfs:9000
      MC_OBJECT_STORAGE_REGION: us-east-1
      MC_OBJECT_STORAGE_BUCKET: missioncontrol
      MC_OBJECT_STORAGE_SECURE: "false"
      MC_OBJECT_STORAGE_ACCESS_KEY: missioncontrol
      MC_OBJECT_STORAGE_ACCESS_SECRET: missioncontrol-secret
      MC_CORS_ALLOW_ORIGINS: "http://localhost:5173,http://localhost:8008"
    ports:
      - "8008:8008"
    volumes:
      - ./backend:/app
      - ./web:/app/web
      - missioncontrol-dev-data:/data

volumes:
  missioncontrol-dev-rustfs:
  missioncontrol-dev-data:
