name: Mirror to missioncontrol-ai

on:
  push:
    branches: ["**"]
  create:
  delete:

permissions:
  contents: read

jobs:
  mirror:
    if: github.repository != 'missioncontrol-ai/missioncontrol'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push mirror to missioncontrol-ai
        run: |
          git remote add mirror https://x-access-token:${{ secrets.GH_MIRROR_TOKEN }}@github.com/missioncontrol-ai/missioncontrol.git
          git push mirror --mirror
