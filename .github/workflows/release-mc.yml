name: Release mc

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: mc-linux-x86_64
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: mc-linux-aarch64
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: mc-macos-x86_64
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: mc-macos-aarch64
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: mc-windows-x86_64.exe
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('integrations/mc/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} --manifest-path integrations/mc/Cargo.toml

      - name: Build (native)
        if: '!matrix.use_cross'
        working-directory: integrations/mc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          BIN=$(find integrations/mc/target/${{ matrix.target }}/release target/${{ matrix.target }}/release -maxdepth 1 -name mc -type f 2>/dev/null | head -1)
          cp "$BIN" ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: copy integrations\mc\target\${{ matrix.target }}\release\mc.exe ${{ matrix.artifact }}
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 1

  build-mc-mesh:
    name: Build ${{ matrix.artifact }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: mc-mesh-linux-x86_64
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            artifact: mc-mesh-linux-aarch64
            use_cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-mc-mesh-cargo-${{ hashFiles('integrations/mc-mesh/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-mc-mesh-cargo-

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} --manifest-path integrations/mc-mesh/Cargo.toml

      - name: Build (native)
        if: '!matrix.use_cross'
        working-directory: integrations/mc-mesh
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        run: |
          BIN=$(find integrations/mc-mesh/target/${{ matrix.target }}/release target/${{ matrix.target }}/release -maxdepth 1 -name mc-mesh -type f 2>/dev/null | head -1)
          cp "$BIN" ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: [build, build-mc-mesh]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums.txt
        working-directory: artifacts
        run: |
          sha256sum $(ls) > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
