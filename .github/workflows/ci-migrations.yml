name: CI Migrations

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  migrations:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      DATABASE_URL: sqlite:///./ci_migrations.db
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile sanity
        run: python -m compileall app alembic tests

      - name: Enforce kluster naming
        run: python ../scripts/enforce_kluster_naming.py

      - name: Reset CI database
        run: rm -f ./ci_migrations.db

      - name: Migration forward
        run: alembic upgrade head

      - name: Migration drift check
        run: alembic check

      - name: Migration downgrade/upgrade cycle
        run: |
          alembic downgrade base
          alembic upgrade head

      - name: Test suite
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: MCP integration tests
        run: PYTHONPATH=../integrations/missioncontrol-mcp/src python -m unittest discover -s ../integrations/missioncontrol-mcp/tests -p "test_*.py"
