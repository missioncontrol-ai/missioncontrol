name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r backend/requirements.txt
      - run: cd backend && python -m unittest discover -s tests -p "test_*.py"

  mcp-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install paho-mqtt
      - run: cd distribution/missioncontrol-mcp && PYTHONPATH=src python -m unittest discover -s tests -p "test_*.py"
      - name: Install smoke
        run: pip install distribution/missioncontrol-mcp/
      - run: bash -c 'echo "{}" | missioncontrol-mcp --help || true'

  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r backend/requirements.txt
      - run: cd backend && python -m alembic upgrade head

  launch-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run mc launch regression harness
        run: bash scripts/launch-regression.sh
