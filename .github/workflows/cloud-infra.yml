name: Cloud Infra

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      apply:
        required: false
        type: boolean
        default: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7
      - name: Configure Azure Credentials
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Install Helm
        uses: azure/setup-helm@v1
        with:
          version: v3.12.0
      - name: Terraform Init
        working-directory: infra/terraform/environments/azure
        run: terraform init
      - name: Terraform Plan
        working-directory: infra/terraform/environments/azure
        run: terraform plan -input=false
      - name: Terraform Apply
        if: ${{ inputs.apply }}
        working-directory: infra/terraform/environments/azure
        run: terraform apply -auto-approve
      - name: Export Kubeconfig
        if: ${{ inputs.apply }}
        run: |
          pushd infra/terraform/environments/azure
          terraform output -raw kube_admin_config_raw > /tmp/kubeconfig
          terraform output -raw resource_group_name > /tmp/mc_rg
          terraform output -raw postgres_hostname > /tmp/postgres_host
          popd
          mkdir -p ~/.kube
          mv /tmp/kubeconfig ~/.kube/azure_kubeconfig
      - name: Deploy MissionControl
        if: ${{ inputs.apply }}
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MC_TOKEN: ${{ secrets.MC_TOKEN }}
        run: |
          RESOURCE_GROUP=$(cat /tmp/mc_rg)
          az aks get-credentials --name missioncontrol-aks --resource-group "$RESOURCE_GROUP" --file ~/.kube/azure_kubeconfig --overwrite-existing
          export KUBECONFIG=~/.kube/azure_kubeconfig
          POSTGRES_HOST=$(cat /tmp/postgres_host)
          helm upgrade --install missioncontrol infra/helm/missioncontrol \
            --values infra/helm/missioncontrol/values.yaml \
            --set config.POSTGRES_HOST="$POSTGRES_HOST" \
            --set-string config.POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
            --set-string config.MC_TOKEN="$MC_TOKEN"
      - name: Smoke Tests
        if: ${{ inputs.apply }}
        run: |
          export KUBECONFIG=~/.kube/azure_kubeconfig
          kubectl run mc-smoke --image=busybox --restart=Never --rm -- sh -c "wget -qO- http://missioncontrol-api/healthz"
