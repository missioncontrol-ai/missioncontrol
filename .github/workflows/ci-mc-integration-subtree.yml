name: CI mc-integration Subtree

on:
  pull_request:
    paths:
      - "distribution/mc-integration/**"
      - "scripts/release-mc-integration-subtree.sh"
      - "docs/MC-INTEGRATION-SUBTREE.md"
      - ".github/workflows/ci-mc-integration-subtree.yml"
  push:
    branches:
      - main
    paths:
      - "distribution/mc-integration/**"
      - "scripts/release-mc-integration-subtree.sh"
      - "docs/MC-INTEGRATION-SUBTREE.md"
      - ".github/workflows/ci-mc-integration-subtree.yml"

jobs:
  subtree-split:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify export prefix exists
        run: test -d distribution/mc-integration

      - name: Verify subtree split is reproducible
        run: |
          git subtree split --prefix distribution/mc-integration -b ci/mc-integration-subtree
          git show --quiet --oneline ci/mc-integration-subtree

  integration-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install missioncontrol-mcp from local source
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./integrations/missioncontrol-mcp

      - name: MCP unit tests
        run: |
          PYTHONPATH=integrations/missioncontrol-mcp/src \
          python -m unittest -v integrations/missioncontrol-mcp/tests/test_server.py integrations/missioncontrol-mcp/tests/test_explorer.py

      - name: Run doctor script against mock MissionControl endpoint
        run: |
          set -euo pipefail
          python - <<'PY' &
          import json
          from http.server import BaseHTTPRequestHandler, HTTPServer

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  path = self.path.split("?", 1)[0]
                  if path == "/":
                      payload = {"status": "ok"}
                  elif path == "/mcp/health":
                      payload = {"status": "ok", "tools_count": 0}
                  elif path == "/mcp/tools":
                      payload = []
                  elif path == "/explorer/tree":
                      payload = {
                          "generated_at": "2026-01-01T00:00:00Z",
                          "mission_count": 0,
                          "kluster_count": 0,
                          "task_count": 0,
                          "missions": [],
                          "unassigned_klusters": [],
                      }
                  else:
                      self.send_response(404)
                      self.end_headers()
                      return
                  body = json.dumps(payload).encode("utf-8")
                  self.send_response(200)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)

              def log_message(self, format, *args):
                  return

          HTTPServer(("127.0.0.1", 18008), Handler).serve_forever()
          PY
          mock_pid=$!
          trap 'kill "$mock_pid"' EXIT

          bash distribution/mc-integration/scripts/doctor.sh \
            --endpoint "http://127.0.0.1:18008" \
            --token "test-token"
