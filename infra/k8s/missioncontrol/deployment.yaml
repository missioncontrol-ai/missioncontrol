apiVersion: apps/v1
kind: Deployment
metadata:
  name: missioncontrol-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: missioncontrol-api
  template:
    metadata:
      labels:
        app: missioncontrol-api
    spec:
      containers:
        - name: missioncontrol
          image: ghcr.io/missioncontrol-ai/missioncontrol:latest
          envFrom:
            - configMapRef:
                name: missioncontrol-config
          ports:
            - containerPort: 8008
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8008
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8008
