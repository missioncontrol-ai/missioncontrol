services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: missioncontrol-mosquitto
    restart: unless-stopped
    volumes:
      - ./docker/mosquitto/mosquitto.dev.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -C 1 -t '$$SYS/broker/version' -i healthcheck >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    mem_limit: 256m
    cpus: 1.0

  rustfs:
    image: rustfs/rustfs:latest
    container_name: missioncontrol-rustfs
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: missioncontrol
      RUSTFS_SECRET_KEY: missioncontrol-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - missioncontrol-rustfs-data:/data
    healthcheck:
      test: ["CMD-SHELL", "code=$$(curl -s -o /dev/null -w '%{http_code}' http://localhost:9000/health/live || true); [ \"$$code\" = \"200\" ] || [ \"$$code\" = \"403\" ]"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    mem_limit: 512m
    cpus: 1.0

  rustfs-init:
    image: python:3.11-slim
    container_name: missioncontrol-rustfs-init
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      MC_OBJECT_STORAGE_ENDPOINT: http://rustfs:9000
      MC_OBJECT_STORAGE_REGION: us-east-1
      MC_OBJECT_STORAGE_ACCESS_KEY: missioncontrol
      MC_OBJECT_STORAGE_ACCESS_SECRET: missioncontrol-secret
      MC_OBJECT_STORAGE_BUCKET: missioncontrol
      MC_OBJECT_STORAGE_SECURE: "false"
    entrypoint:
      - /bin/sh
      - -lc
      - |
        pip install --no-cache-dir boto3 >/tmp/rustfs-init-pip.log
        python - <<'PY'
        import os
        import boto3
        from botocore.exceptions import ClientError

        endpoint = os.environ["MC_OBJECT_STORAGE_ENDPOINT"]
        region = os.environ["MC_OBJECT_STORAGE_REGION"]
        access_key = os.environ["MC_OBJECT_STORAGE_ACCESS_KEY"]
        secret_key = os.environ["MC_OBJECT_STORAGE_ACCESS_SECRET"]
        bucket = os.environ["MC_OBJECT_STORAGE_BUCKET"]
        secure = os.environ.get("MC_OBJECT_STORAGE_SECURE", "false").lower() == "true"

        if endpoint.startswith("http://") or endpoint.startswith("https://"):
            endpoint_url = endpoint
        else:
            scheme = "https" if secure else "http"
            endpoint_url = f"{scheme}://{endpoint}"

        client = boto3.client(
            "s3",
            endpoint_url=endpoint_url,
            aws_access_key_id=access_key,
            aws_secret_access_key=secret_key,
            region_name=region,
        )

        try:
            client.head_bucket(Bucket=bucket)
            print(f"bucket exists: {bucket}")
        except ClientError as exc:
            error_code = exc.response.get("Error", {}).get("Code", "")
            if error_code in {"404", "NoSuchBucket", "NotFound"}:
                client.create_bucket(Bucket=bucket)
                print(f"bucket created: {bucket}")
            else:
                raise
        PY
    restart: "no"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: missioncontrol-api
    depends_on:
      mosquitto:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////data/taskman.db
      VECTOR_STORE_BACKEND: chroma
      MC_DB_RUNTIME_MIGRATIONS: "true"
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_USERNAME: ""
      MQTT_PASSWORD: ""
      MC_OBJECT_STORAGE_ENDPOINT: http://rustfs:9000
      MC_OBJECT_STORAGE_REGION: us-east-1
      MC_OBJECT_STORAGE_BUCKET: missioncontrol
      MC_OBJECT_STORAGE_SECURE: "false"
      MC_OBJECT_STORAGE_ACCESS_KEY: missioncontrol
      MC_OBJECT_STORAGE_ACCESS_SECRET: missioncontrol-secret
    ports:
      - "8008:8008"
    volumes:
      - ./backend/chroma:/app/chroma
      - ./backend/dev-data:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1',8008), 2); s.close()\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 25s
    mem_limit: 1g
    cpus: 1.5

  mcpd:
    build:
      context: .
      dockerfile: integrations/missioncontrol-mcp/Dockerfile
    container_name: missioncontrol-mcpd
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    environment:
      MC_MCP_MODE: daemon
      MC_BASE_URL: http://api:8008
      MC_DAEMON_HOST: 0.0.0.0
      MC_DAEMON_PORT: "8765"
      MC_TOKEN: ${MC_TOKEN:-}
    ports:
      - "8765:8765"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1',8765), 2); s.close()\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    mem_limit: 256m
    cpus: 1.0

volumes:
  missioncontrol-rustfs-data:
