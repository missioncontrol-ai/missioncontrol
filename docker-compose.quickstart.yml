services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: missioncontrol-mosquitto
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  rustfs:
    image: rustfs/rustfs:latest
    container_name: missioncontrol-rustfs
    environment:
      RUSTFS_ACCESS_KEY: missioncontrol
      RUSTFS_ACCESS_SECRET: missioncontrol-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - missioncontrol-rustfs-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  rustfs-init:
    image: minio/mc:latest
    container_name: missioncontrol-rustfs-init
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://rustfs:9000 missioncontrol missioncontrol-secret &&
        mc mb --ignore-existing local/missioncontrol &&
        echo 'bucket ready'
      "
    restart: "no"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: missioncontrol-api
    depends_on:
      - mosquitto
      - rustfs-init
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////data/taskman.db
      VECTOR_STORE_BACKEND: chroma
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_USERNAME: ""
      MQTT_PASSWORD: ""
      MC_OBJECT_STORAGE_ENDPOINT: http://rustfs:9000
      MC_OBJECT_STORAGE_REGION: us-east-1
      MC_OBJECT_STORAGE_BUCKET: missioncontrol
      MC_OBJECT_STORAGE_SECURE: "false"
      MC_OBJECT_STORAGE_ACCESS_KEY: missioncontrol
      MC_OBJECT_STORAGE_ACCESS_SECRET: missioncontrol-secret
    ports:
      - "8008:8008"
    volumes:
      - ./backend/chroma:/app/chroma
      - ./backend/dev-data:/data

  mcpd:
    build:
      context: .
      dockerfile: integrations/missioncontrol-mcp/Dockerfile
    container_name: missioncontrol-mcpd
    depends_on:
      - api
    environment:
      MC_MCP_MODE: daemon
      MC_BASE_URL: http://api:8008
      MC_DAEMON_HOST: 0.0.0.0
      MC_DAEMON_PORT: "8765"
      MC_TOKEN: ${MC_TOKEN:-}
    ports:
      - "8765:8765"

volumes:
  missioncontrol-rustfs-data:
