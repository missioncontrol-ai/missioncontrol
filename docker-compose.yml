services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg18
    container_name: missioncontrol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-missioncontrol}
      POSTGRES_USER: ${POSTGRES_USER:-missioncontrol}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - missioncontrol-postgres-data:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-missioncontrol} -d ${POSTGRES_DB:-missioncontrol} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    mem_limit: 2g
    cpus: 2.0

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: missioncontrol-mosquitto
    restart: unless-stopped
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME:-missioncontrol}
      MQTT_PASSWORD: ${MQTT_PASSWORD:?set MQTT_PASSWORD}
    ports:
      - "1884:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.prod.conf:/mosquitto/config/mosquitto.conf:ro
      - ${MQTT_PASSWORD_FILE:-./docker/mosquitto/passwords/passwords}:/mosquitto/config/passwords/passwords:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -C 1 -t '$$SYS/broker/version' -i healthcheck -u \"$$MQTT_USERNAME\" -P \"$$MQTT_PASSWORD\" >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    mem_limit: 512m
    cpus: 1.0

  rustfs:
    image: rustfs/rustfs:latest
    container_name: missioncontrol-rustfs
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: ${MC_OBJECT_STORAGE_ACCESS_KEY:?set MC_OBJECT_STORAGE_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${MC_OBJECT_STORAGE_ACCESS_SECRET:?set MC_OBJECT_STORAGE_ACCESS_SECRET}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - missioncontrol-rustfs-data:/data
    healthcheck:
      test: ["CMD-SHELL", "code=$$(curl -s -o /dev/null -w '%{http_code}' http://localhost:9000/health/live || true); [ \"$$code\" = \"200\" ] || [ \"$$code\" = \"403\" ]"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    mem_limit: 1g
    cpus: 1.5

  rustfs-init:
    image: missioncontrol-api
    container_name: missioncontrol-rustfs-init
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      MC_OBJECT_STORAGE_ENDPOINT: http://rustfs:9000
      MC_OBJECT_STORAGE_REGION: us-east-1
      MC_OBJECT_STORAGE_BUCKET: ${MC_OBJECT_STORAGE_BUCKET:-missioncontrol}
      MC_OBJECT_STORAGE_ACCESS_KEY: ${MC_OBJECT_STORAGE_ACCESS_KEY:?set MC_OBJECT_STORAGE_ACCESS_KEY}
      MC_OBJECT_STORAGE_ACCESS_SECRET: ${MC_OBJECT_STORAGE_ACCESS_SECRET:?set MC_OBJECT_STORAGE_ACCESS_SECRET}
    entrypoint:
      - python
      - -c
      - |
          import os
          import sys
          import time
          import boto3
          from botocore.exceptions import ClientError

          endpoint = os.environ["MC_OBJECT_STORAGE_ENDPOINT"]
          region = os.environ.get("MC_OBJECT_STORAGE_REGION", "us-east-1")
          bucket = os.environ["MC_OBJECT_STORAGE_BUCKET"]
          access = os.environ["MC_OBJECT_STORAGE_ACCESS_KEY"]
          secret = os.environ["MC_OBJECT_STORAGE_ACCESS_SECRET"]

          client = boto3.client(
              "s3",
              endpoint_url=endpoint,
              region_name=region,
              aws_access_key_id=access,
              aws_secret_access_key=secret,
              use_ssl=False,
          )

          for attempt in range(1, 31):
              try:
                  client.create_bucket(Bucket=bucket)
                  print(f"bucket created: {bucket}")
                  sys.exit(0)
              except ClientError as exc:
                  code = (exc.response.get("Error") or {}).get("Code", "")
                  if code in {"BucketAlreadyOwnedByYou", "BucketAlreadyExists"}:
                      print(f"bucket exists: {bucket}")
                      sys.exit(0)
                  if attempt == 30:
                      raise
                  time.sleep(1.0)
              except Exception:
                  if attempt == 30:
                      raise
                  time.sleep(1.0)
    restart: "no"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: missioncontrol-api
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-missioncontrol}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-missioncontrol}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      DB_POOL_PRE_PING: ${DB_POOL_PRE_PING:-true}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-3600}
      MC_DB_AUTO_CREATE: "true"
      MC_DB_RUNTIME_MIGRATIONS: "true"
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_USERNAME: ${MQTT_USERNAME:-missioncontrol}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MC_REQUEST_TIMEOUT_SECONDS: ${MC_REQUEST_TIMEOUT_SECONDS:-30}
      MC_OBJECT_STORAGE_ENDPOINT: http://rustfs:9000
      MC_OBJECT_STORAGE_REGION: us-east-1
      MC_OBJECT_STORAGE_BUCKET: ${MC_OBJECT_STORAGE_BUCKET:-missioncontrol}
      MC_OBJECT_STORAGE_SECURE: "false"
      MC_OBJECT_STORAGE_ACCESS_KEY: ${MC_OBJECT_STORAGE_ACCESS_KEY}
      MC_OBJECT_STORAGE_ACCESS_SECRET: ${MC_OBJECT_STORAGE_ACCESS_SECRET}
    ports:
      - "8008:8008"
    volumes:
      - ./backend/chroma:/app/chroma
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8008/readyz', timeout=3).status == 200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 25s
    mem_limit: 2g
    cpus: 2.0

  mcpd:
    build:
      context: .
      dockerfile: integrations/missioncontrol-mcp/Dockerfile
    container_name: missioncontrol-mcpd
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    environment:
      MC_MCP_MODE: daemon
      MC_BASE_URL: http://api:8008
      MC_DAEMON_HOST: 0.0.0.0
      MC_DAEMON_PORT: "8765"
      MC_TOKEN: ${MC_TOKEN:-}
    ports:
      - "8765:8765"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8765/healthz', timeout=3).status == 200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    mem_limit: 512m
    cpus: 1.0

volumes:
  missioncontrol-postgres-data:
  missioncontrol-rustfs-data:
