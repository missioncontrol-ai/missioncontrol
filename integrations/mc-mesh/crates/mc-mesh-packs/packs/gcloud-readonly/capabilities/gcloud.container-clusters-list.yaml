name: gcloud.container-clusters-list
version: 1
description: List GKE clusters in the active project
backend:
  type: subprocess
  command: gcloud
  args: ["container", "clusters", "list", "--format=json"]
risk: low
sideEffectClass: readOnly
inputSchema:
  type: object
  properties:
    project:
      type: string
      description: GCP project ID (uses active project if omitted)
