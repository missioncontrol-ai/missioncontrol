name: family.check-access
version: 1
description: Check whether a family member is allowed to start a session right now
backend:
  type: remote
  url: "{{MC_API_URL}}/family/members/{{subject}}/access"
risk: low
sideEffectClass: none
inputSchema:
  type: object
  properties:
    subject:
      type: string
      description: MC subject identifier for the family member
  required: [subject]
