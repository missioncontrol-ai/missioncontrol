name: incus.image-list
version: 1
description: List available Incus images
backend:
  type: subprocess
  command: incus
  args: ["image", "list", "--format", "json"]
risk: low
sideEffectClass: readOnly
inputSchema:
  type: object
  properties:
    filter:
      type: string
      description: Filter by alias or fingerprint prefix
