name: gh.issue-list
version: 1
description: List issues in the current or specified repository
backend:
  type: subprocess
  command: gh
  args: ["issue", "list", "--json", "number,title,state,labels,createdAt,assignees", "--limit", "30"]
risk: low
sideEffectClass: readOnly
inputSchema:
  type: object
  properties:
    repo:
      type: string
      description: Repository (owner/name). Uses current repo if omitted.
    state:
      type: string
      description: "Filter by state: open (default), closed, all"
